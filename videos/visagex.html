<script>
async function initPlayer() {
  const video = document.getElementById('video');
  const ui = video['ui'];
  const controls = ui.getControls();
  const player = controls.getPlayer();

  // 1. Customize Seekbar Colors via Javascript
  const config = {
    'seekBarColors': {
      base: 'rgba(255, 255, 255, 0.3)',    // The unplayed part
      buffered: 'rgba(255, 255, 255, 0.5)',// The pre-loaded part
      played:  '#DBB665',                  // The played part (Brand Color)
    }
  };
  ui.configure(config);

  // 2. Load your MP4 Link
  try {
    await player.load('https://gamma.videonest.org/6de48f7e-389e-46fb-a45f-724e7771eec6_video_v5.mp4');
  } catch (e) {
    console.error('Error loading video', e);
  }
}

document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
